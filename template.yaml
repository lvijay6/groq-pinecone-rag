AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 60
    MemorySize: 1024
    Environment:
      Variables:
        AWS_SECRET_NAME: agentic-ai-secrets
        AWS_REGION: !Ref AWS::Region

Resources:
  RagFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rag-pipeline
      Handler: rag_handler.handler
      Runtime: python3.13
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:agentic-ai-secrets*
      Events:
        RagApi:
          Type: Api
          Properties:
            Path: /rag/query
            Method: POST

  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: finance-assistant-agent
      Handler: agent_handler.handler
      Runtime: python3.13
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:agentic-ai-secrets*
      Events:
        AgentApi:
          Type: Api
          Properties:
            Path: /agent/chat
            Method: POST

Outputs:
  RagApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/rag/query"
  AgentApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/agent/chat"
